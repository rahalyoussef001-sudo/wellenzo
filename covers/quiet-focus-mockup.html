<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Book Mockup — Quiet Focus</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-primary: #1A2F25;
      --color-accent: #10B981;
      --color-bg: #FAFBF9;
      --color-text-secondary: #4A5568;
      --color-border: #DDE5E0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #F1F5F9;
      font-family: 'Outfit', sans-serif;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    h1 {
      font-size: 1.8rem;
      color: var(--color-primary);
      margin-bottom: 0.5rem;
    }

    p.desc {
      font-size: 0.95rem;
      color: var(--color-text-secondary);
      margin-bottom: 3rem;
    }

    /* --- 3D Book Container --- */
    .scene {
      width: 320px;
      height: 460px;
      perspective: 1500px;
      margin: 0 auto;
    }

    .book {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateY(-25deg) rotateX(10deg);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .scene:hover .book {
      transform: rotateY(-10deg) rotateX(5deg) scale(1.02);
    }

    /* --- Faces --- */
    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 2px 8px 8px 2px;
    }

    .front {
      background: var(--color-bg);
      transform: translateZ(15px);
      box-shadow: inset 4px 0 10px rgba(0,0,0,0.05);
      border: 1px solid var(--color-border);
      border-left: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 35px 25px;
      z-index: 10;
    }

    .front-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .front-brand {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 0.5rem;
    }

    .front-decorator {
      width: 50px;
      height: 2px;
      background: var(--color-accent);
      margin-bottom: 1.25rem;
    }

    .front-title {
      font-size: 2.1rem;
      font-weight: 800;
      line-height: 1.1;
      color: var(--color-primary);
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    .front-subtitle {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      line-height: 1.4;
      max-width: 90%;
    }

    .front-art-container {
      width: 100%;
      height: 150px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--color-border);
      background: #FFFFFF;
      margin: 1.5rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .front-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .front-author {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-primary);
    }

    /* --- Spine --- */
    .spine {
      width: 30px;
      background: var(--color-primary);
      transform: rotateY(-90deg) translateZ(15px);
      left: -15px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset -5px 0 10px rgba(0,0,0,0.3);
    }

    .spine-text {
      color: #FFFFFF;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      white-space: nowrap;
      transform: rotate(-90deg);
    }

    /* --- Back Cover --- */
    .back {
      background: var(--color-primary);
      transform: rotateY(180deg) translateZ(15px);
      box-shadow: 10px 10px 30px rgba(0,0,0,0.15);
      border-radius: 8px 2px 2px 8px;
    }

    /* --- Pages (3D thickness effect) --- */
    .right {
      width: 28px;
      background: #EBEFEF;
      background-image: linear-gradient(90deg, #EBEFEF 0%, #FFFFFF 100%);
      transform: rotateY(90deg) translateZ(305px);
      box-shadow: inset 10px 0 20px rgba(0,0,0,0.1);
      border-radius: 0 4px 4px 0;
    }

    .bottom {
      height: 28px;
      background: #EBEFEF;
      transform: rotateX(-90deg) translateZ(445px);
      box-shadow: inset 0 10px 20px rgba(0,0,0,0.1);
    }

    /* 3D Shadows */
    .shadow {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
      box-shadow: -20px 20px 40px rgba(0,0,0,0.3);
      transform: translateZ(-20px);
      border-radius: 8px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiet Focus — 3D Mockup</h1>
    <p class="desc">Interactive pur-CSS 3D book cover for landing pages and marketing previews.</p>

    <div class="scene">
      <div class="book">
        <div class="shadow"></div>
        
        <!-- Front Cover -->
        <div class="face front">
          <div class="front-top">
            <span class="front-brand">Wellenzo</span>
            <div class="front-decorator"></div>
            <h2 class="front-title">Quiet Focus</h2>
            <p class="front-subtitle">A Science-Backed, Neuro-Affirming Playbook to Overcome Task Paralysis</p>
          </div>
          
          <div class="front-art-container">
            <img class="front-art" src="../ebook en/assets/cover.png" alt="Quiet Focus Botanical Cover Art" />
          </div>
          
          <p class="front-author">By Alex</p>
        </div>
        
        <!-- Spine -->
        <div class="face spine">
          <div class="spine-text">Quiet Focus — Wellenzo</div>
        </div>
        
        <!-- Pages Thickness -->
        <div class="face right"></div>
        <div class="face bottom"></div>
        
        <!-- Back Cover -->
        <div class="face back"></div>
      </div>
    </div>
  </div>
</body>
</html>
