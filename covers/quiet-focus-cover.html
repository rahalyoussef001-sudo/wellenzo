<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ebook Cover — Quiet Focus</title>
  <meta name="description" content="Visual cover design for Quiet Focus: A science-backed, neuro-affirming playbook to overcome task paralysis and manage brain fog.">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Quiet Focus Ebook Cover">
  <meta property="og:description" content="Ebook cover design for the Wellenzo ADHD Quiet Focus playbook.">
  <meta property="og:type" content="website">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-primary: #1A2F25;
      --color-accent: #10B981;
      --color-bg: #FAFBF9;
      --color-text-secondary: #4A5568;
      --color-text-muted: #718096;
      --color-border: #DDE5E0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #E2E8F0;
      font-family: 'Outfit', system-ui, sans-serif;
    }

    .cover {
      width: 800px;
      height: 1280px;
      background: var(--color-bg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      padding: 90px 60px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
      border-radius: 4px;
    }

    .cover-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .cover-brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 1rem;
    }

    .cover-decorator {
      width: 120px;
      height: 4px;
      background: var(--color-accent);
      border-radius: 2px;
      margin-bottom: 2.5rem;
    }

    .cover-title {
      font-size: 4.8rem;
      font-weight: 800;
      line-height: 1.05;
      color: var(--color-primary);
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
      max-width: 95%;
    }

    .cover-subtitle {
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--color-text-secondary);
      max-width: 85%;
      line-height: 1.5;
    }

    .cover-middle {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      flex-grow: 1;
      margin: 3rem 0;
    }

    .cover-art-container {
      width: 100%;
      max-width: 500px;
      height: 380px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--color-border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cover-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .cover-author {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--color-primary);
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
    }

    .cover-badge {
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      border-top: 1px solid var(--color-border);
      padding-top: 1.5rem;
      width: 60%;
    }

    /* Responsive for screen preview */
    @media (max-width: 850px) {
      body {
        background: var(--color-bg);
      }
      .cover {
        width: 100vw;
        height: 160vw;
        box-shadow: none;
        padding: 50px 30px;
        border-radius: 0;
      }
      .cover-title { font-size: 3rem; }
      .cover-subtitle { font-size: 1rem; }
      .cover-art-container { height: 260px; }
      .cover-author { font-size: 1rem; }
      .cover-badge { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="cover-top">
      <span class="cover-brand">Wellenzo</span>
      <div class="cover-decorator"></div>
      <h1 class="cover-title">Quiet Focus</h1>
      <p class="cover-subtitle">A Science-Backed, Neuro-Affirming Playbook to Overcome Task Paralysis and Manage Brain Fog (Without Burnout)</p>
    </div>

    <div class="cover-middle">
      <div class="cover-art-container">
        <img class="cover-art" src="../ebook en/assets/cover.png" alt="Wellenzo Quiet Focus Botanical Art" />
      </div>
    </div>

    <div class="cover-bottom">
      <p class="cover-author">By Alex</p>
      <span class="cover-badge">Premium Digital Guide</span>
    </div>
  </div>
</body>
</html>
